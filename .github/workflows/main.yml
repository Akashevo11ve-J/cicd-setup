name: API Test and Deploy

on:
  push:
    branches:
      - live-dev

jobs:

  # JOB 1 — TEST YOUR APIs
  test:
    name: Test Both APIs
    runs-on: ubuntu-latest

    steps:

      - name: Get the code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test tools
        run: pip install pytest requests

      # No SERVER_IP needed — hardcode IP in test file directly
      - name: Run API tests
        run: pytest tests/test_all_apis.py -v --tb=short 2>&1 | tee test-results.log

      - name: Save test logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: test-results.log


  # JOB 2 — TESTS FAILED
  if_tests_failed:
    name: Revert and Send Failure Email
    runs-on: ubuntu-latest
    needs: test
    if: failure()

    steps:

      - name: Get the code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Revert bad code
        run: |
          git config user.email "ci@yourcompany.com"
          git config user.name "CI Bot"
          git revert HEAD --no-edit
          git push origin live-dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get test logs
        uses: actions/download-artifact@v3
        with:
          name: test-logs

      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Tests FAILED - Code Reverted"
          to: yourteam@gmail.com
          from: CI Bot <ci@gmail.com>
          body: |
            Tests failed on live-dev branch.
            Code has been automatically reverted on GitHub.
            See attached logs for details.
            
            You do NOT need to do anything on server.
            Server was not touched.
          attachments: test-results.log


  # JOB 3 — TESTS PASSED
  if_tests_passed:
    name: Send Success Email
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:

      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Tests PASSED - Pull and Restart Manually"
          to: yourteam@gmail.com
          from: CI Bot <ci@gmail.com>
          body: |
            All API tests passed on live-dev.
            
            Please do these steps manually on your server:
            
            cd /home/ubuntu/cicd-setup
            git pull origin live-dev
            bash restart_explore.sh
