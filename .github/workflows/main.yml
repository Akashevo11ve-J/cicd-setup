name: API Test and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  test:
    name: Test Both APIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest requests pymongo

      - name: Run API tests
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
        run: pytest tests/test_all_apis.py -v --tb=short 2>&1 | tee test-results.log

      - name: Save test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-results.log


  if_tests_failed:
    name: Revert and Send Failure Email
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'failure'  
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Revert bad commit
        run: |
          git config user.email "ci@yourcompany.com"
          git config user.name "CI Bot"
          git revert HEAD --no-edit
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs

      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Tests FAILED - Code Reverted"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Tests failed on main branch.
            Code has been automatically reverted on GitHub.
            Server was NOT touched.
            See attached log for details.
          attachments: test-results.log


  if_tests_passed:
    name: Send Success Email
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success' 
    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Tests PASSED - Pull and Restart Manually"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            All API tests passed on main. 
