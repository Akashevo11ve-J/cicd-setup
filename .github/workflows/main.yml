# ============================================
# CI/CD Pipeline for Explore + Practice APIs
# ============================================

name: API Test and Deploy

on:
  push:
    branches:
      - live-dev       

jobs:

  # JOB 1 — TEST YOUR API
  test:
    name: Test Both APIs
    runs-on: ubuntu-latest      # GitHub gives us a fresh Linux machine

    steps:

      # Step 1 — Download your code onto GitHub's machine
      - name: Get the code
        uses: actions/checkout@v3

      # Step 2 — Install Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3 — Install test libraries
      - name: Install test tools
        run: pip install pytest requests

      # Step 4 — Run tests against your server
      - name: Run API tests
        run: pytest tests/test_all_apis.py -v --tb=short 2>&1 | tee test-results.log
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}  

      # Step 5 — Save the test log (whether pass or fail)
      - name: Save test logs
        if: always()    
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: test-results.log


  # JOB 2 — Runs only when Job 1 fails
  if_tests_failed:
    name: Revert and Send Failure Email
    runs-on: ubuntu-latest
    needs: test           
    if: failure()        

    steps:

      # Step 1 — Get the code
      - name: Get the code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2 — Undo the bad commit automatically
      - name: Revert bad code
        run: |
          git config user.email "ci@yourcompany.com"
          git config user.name "CI Bot"
          git revert HEAD --no-edit
          git push origin live-dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   

      # Step 3 — Download the saved test logs
      - name: Get test logs
        uses: actions/download-artifact@v3
        with:
          name: test-logs

      # Step 4 — Send failure email with logs attached
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}    
          password: ${{ secrets.MAIL_PASSWORD }}    
          subject: "❌ Tests FAILED - Code Reverted"
          to: yourteam@gmail.com
          from: CI Bot <ci@gmail.com>
          body: |
            Tests failed on live-dev branch.
            Code has been automatically reverted.
            See attached log file for details.
          attachments: test-results.log


  # ============================================
  # JOB 3 — IF TESTS PASSED
  # Runs only when Job 1 passes
  # ============================================
  if_tests_passed:
    name: Deploy and Send Success Email
    runs-on: ubuntu-latest
    needs: test           # waits for test job to finish
    if: success()         # only runs if test job passed
    environment:
      name: production    # This adds manual approval button in GitHub

    steps:

      # Step 1 — Get the code
      - name: Get the code
        uses: actions/checkout@v3

      # Step 2 — SSH into your server and restart both services
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}            # Your EC2 IP
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}       # Your .pem file content
          script: |
            cd /home/ubuntu/cicd-setup
            git pull origin live-dev
            bash restart_explore.sh

      # Step 3 — Send success email
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Tests PASSED - Deployed Successfully"
          to: yourteam@gmail.com
          from: CI Bot <ci@gmail.com>
          body: |
            All API tests passed on live-dev.
            Both services deployed and restarted.
            Explore  → port 7041
            Practice → port 7042
